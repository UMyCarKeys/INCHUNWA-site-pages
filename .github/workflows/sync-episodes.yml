name: Sync Episodes from Buzzsprout

on:
  schedule:
    - cron: '0 10 * * *'   # 10 AM UTC daily (adjust as needed)
  workflow_dispatch:         # also runnable manually from the Actions tab

permissions:
  contents: write            # needed to commit new episode files

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync episodes from RSS feed
        run: node scripts/sync-episodes.mjs

      - name: Commit and push new episodes (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/episodes/
          if git diff --staged --quiet; then
            echo "No new episodes — nothing to commit."
          else
            git commit -m "sync: add new episodes from Buzzsprout RSS feed"
            git push
          fi
